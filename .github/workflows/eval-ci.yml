name: SEO Skills Eval CI

on:
  push:
    paths:
      - 'skills/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'

jobs:
  trigger-eval:
    name: 触发准确性测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install anthropic

      - name: 运行触发测试
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_all_evals.py \
            --type trigger \
            --skills-path skills/public \
            --threshold 0.85 \
            --output ci_results.json

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: ci_results.json

      - name: 检查通过率
        run: |
          # 解析测试结果，检查通过率是否达到阈值
          python -c "
          import json
          with open('ci_results.json') as f:
              data = json.load(f)
          # 这里需要根据实际输出格式解析
          print('✅ CI 测试通过')
          "

  functional-eval:
    name: 功能测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install anthropic

      - name: 运行功能测试
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_all_evals.py \
            --skills-path skills/public \
            --threshold 0.80 \
            --output functional_results.json

      - name: 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: functional-eval-results
          path: functional_results.json

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 flake8
        run: pip install flake8

      - name: 运行 flake8
        run: |
          # 跳过过长的行（Markdown 中的代码块可能很长）
          flake8 scripts/ --max-line-length=120 --ignore=E501,W503

  validate-json:
    name: JSON 验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 验证 evals.json 文件
        run: |
          for file in $(find skills -name "evals.json"); do
            echo "验证 $file"
            python -c "import json; json.load(open('$file'))" || exit 1
          done

      - name: 验证 trigger_evals.json 文件
        run: |
          for file in $(find skills -name "trigger_evals.json"); do
            echo "验证 $file"
            python -c "import json; json.load(open('$file'))" || exit 1
          done
  # ... 在你原有的 validate-json 任务之后添加 ...

  deploy-to-pages:
    name: 部署到 GitHub Pages
    needs: [trigger-eval, functional-eval, lint, validate-json] # 只有前面四个测试全过，才部署
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署整个根目录

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
